<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Rift &amp; Raid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a25;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #e0e0e0;
      touch-action: none;
      overscroll-behavior: none;
    }
    #app {
      width: 100vw; height: 100vh;
      display: flex;
      align-items: center; justify-content: center;
      position: relative;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
    }
    #boot {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2a1f3d 0%, #1a1a25 100%);
      z-index: 200;
      transition: opacity 0.5s ease;
    }
    #boot h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #d97742, #b080ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    #boot p {
      color: #9090a0;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    #boot .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #b080ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #boot.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .hint {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 11px;
      color: #b0b0c0;
      z-index: 60;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="boot">
    <h1>Rift &amp; Raid</h1>
    <p>Phase 0 — Engine Foundation</p>
    <div class="spinner"></div>
  </div>
  <div class="hint">WASD / arrows to move · Mouse to aim · Click to attack · Space to dash · Touch works on mobile</div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
